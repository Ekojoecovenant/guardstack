name: Release GuardStack

on:
  push:
    tags:
      - 'v*'
      
jobs:
  # Job 1: build all binaries
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - os: windows-latest
            binary: guardstack.exe
            output: guardstack-win.exe
            artifact: guardstack-win
          - os: macos-latest
            binary: guardstack
            output: guardstack-macos
            artifact: guardstack-macos
          - os: ubuntu-latest
            binary: guardstack
            output: guardstack-linux
            artifact: guardstack-linux

    steps:
      # Step 1: checkout code
      - name: Checkout code
        uses: actions/checkout@v4
        
      # Step 2: install Rust
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # Step 3: build release binary
      - name: Build binary
        run: cargo build --release

      # Step 4: rename binary
      - name: Rename binary
        shell: bash
        run: |
          cp target/release/${{ matrix.binary }} bin/${{ matrix.output }}

      # Step 5: upload binary as artifact
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: bin/${{ matrix.output }}

  # Job 2: Publish to npm
  publish:
    name: Publish to npm
    needs: build # wait for ALL builds to finish
    runs-on: ubuntu-latest

    steps:
      # Step 1: checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: download ALL binaries
      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: bin/

      # Step 3: move binaries to correct location
      - name: Move binaries
        run: |
          mv bin/guardstack-win/guardstack-win.exe bin/guardstack-win.exe-final
          mv bin/guardstack-macos/guardstack-macos bin/guardstack-macos-final
          mv bin/guardstack-linux/guardstack-linux bin/guardstack-linux-final
          rm -rf bin/guardstack-win bin/guardstack-macos bin/guardstack-linux
          mv bin/guardstack-win.exe-final bin/guardstack-win.exe
          mv bin/guardstack-macos-final bin/guardstack-macos
          mv bin/guardstack-linux-final bin/guardstack-linux
          chmod +x bin/guardstack-macos
          chmod +x bin/guardstack-linux

      # Step 4: setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          registry-url: 'https://registry.npmjs.org'

      # Step 5: get version from tag
      - name: Get version from tag
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV

      # Step 6: update package.json version
      - name: Update package.json version
        run: npm version ${{ env.VERSION }} --no-git-tag-version
        env:
          VERSION: ${{ env.VERSION }}

      # Step 7: publish to npm
      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Step 8: notify Discord  ← ADD THIS!!
      - name: Notify Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          curl -H "Content-Type: application/json" \
          -d "{
            \"embeds\": [{
              \"title\": \"🛡️ GuardStack v$VERSION Released!!\",
              \"description\": \"A new version of GuardStack is live on npm!!\",
              \"color\": 5763719,
              \"fields\": [
                {\"name\": \"Install\", \"value\": \"\`\`\`npx guardstack check\`\`\`\"},
                {\"name\": \"npm\", \"value\": \"npmjs.com/package/guardstack\"},
                {\"name\": \"GitHub\", \"value\": \"github.com/Ekojoecovenant/guardstack\"}
              ]
            }]
          }" \
          $DISCORD_WEBHOOK
